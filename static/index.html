<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M_Cube Crypto Dashboard</title>
    <!-- Apply persisted theme before the stylesheet evaluates so the first
         paint already matches the user's choice (no flash of wrong theme). -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem("theme");
                if (!t) {
                    t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
                }
                document.documentElement.setAttribute("data-theme", t);
            } catch (_) {
                document.documentElement.setAttribute("data-theme", "light");
            }
        })();
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://cdn.plot.ly" crossorigin>
    <!-- Plotly.js for charts — deferred so it doesn't block first paint. -->
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js" defer></script>
</head>
<body>
    <!-- Top Header Bar -->
    <header class="top-header">
        <div class="header-brand">M_Cube</div>
        <div class="header-settings">
            <label for="catalog-path">Catalog Path:</label>
            <input type="text" id="catalog-path" value="./catalog" placeholder="Catalog path">
            <button type="button" id="theme-toggle-btn" class="theme-toggle"
                    onclick="App.toggleTheme()"
                    title="Toggle dark / light mode" aria-label="Toggle theme">
                <span class="theme-icon-light" aria-hidden="true">&#9788;</span>
                <span class="theme-icon-dark" aria-hidden="true">&#9790;</span>
            </button>
        </div>
    </header>

    <!-- Top Tab Navigation -->
    <nav class="top-tabs" id="sidebar">
        <a href="#" class="nav-item active" data-page="dashboard">Dashboard</a>
        <a href="#" class="nav-item" data-page="load_data">Load Data</a>
        <a href="#" class="nav-item" data-page="view_data">View Data</a>
        <a href="#" class="nav-item" data-page="backtest">Run Backtest</a>
        <a href="#" class="nav-item" data-page="tearsheet">Tearsheet</a>
        <a href="#" class="nav-item" data-page="orderbook">Orderbook</a>
        <a href="#" class="nav-item" data-page="portfolio">Multileg</a>
        <a href="#" class="nav-item" data-page="portfolio_tearsheet">Portfolio Tearsheet</a>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Pages are rendered here dynamically -->
    </main>

    <!-- Action / Control Bar -->
    <div class="action-bar" id="action-bar">
        <div class="action-bar-left" id="action-bar-buttons">
            <!-- Page-specific buttons injected here by each page -->
        </div>
        <div class="action-bar-right">
            <button class="btn btn-sm" onclick="App.toggleLog()" id="log-toggle-btn">
                Log <span id="log-count-badge" class="btn-badge" style="display:none;">0</span>
            </button>
            <button class="btn btn-sm" onclick="App.clearLog()">Clear Log</button>
        </div>
    </div>

    <!-- Persistent Activity Log Panel -->
    <div class="log-panel" id="log-panel">
        <table id="log-table">
            <thead>
                <tr>
                    <th style="width: 150px;">Timestamp</th>
                    <th style="width: 90px;">Log Type</th>
                    <th>Message</th>
                    <th style="width: 90px;">Source</th>
                    <th style="width: 120px;">Strategy Tag</th>
                </tr>
            </thead>
            <tbody id="log-tbody">
            </tbody>
        </table>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p id="loading-text">Loading...</p>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- JS Modules — deferred so they execute in order after parse but don't block rendering. -->
    <script src="/js/app.js" defer></script>
    <script src="/js/dashboard.js" defer></script>
    <script src="/js/load_data.js" defer></script>
    <script src="/js/view_data.js" defer></script>
    <script src="/js/backtest.js" defer></script>
    <script src="/js/tearsheet.js" defer></script>
    <script src="/js/orderbook.js" defer></script>
    <script src="/js/portfolio.js" defer></script>
    <script src="/js/portfolio_tearsheet.js" defer></script>
</body>
</html>
