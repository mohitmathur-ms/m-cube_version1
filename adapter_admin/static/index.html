<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M_Cube - Adapter Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">M_Cube</div>
            <div class="sidebar-caption">Adapter Admin Panel</div>
        </div>

        <div class="sidebar-divider"></div>

        <nav class="sidebar-nav">
            <a class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
                <span class="nav-icon">&#128268;</span> Configured Adapters
            </a>
            <a class="nav-item" data-page="adapter_config" onclick="App.navigate('adapter_config')">
                <span class="nav-icon">&#10133;</span> Add Adapter
            </a>
            <a class="nav-item" data-page="custom_adapters" onclick="App.navigate('custom_adapters')">
                <span class="nav-icon">&#128196;</span> Custom Adapters
            </a>
            <a class="nav-item" data-page="data_formats" onclick="App.navigate('data_formats')">
                <span class="nav-icon">&#128202;</span> Data Formats
            </a>
        </nav>

        <div class="sidebar-divider"></div>

        <div class="sidebar-info">
            <strong>Quick Guide</strong>
            <ol>
                <li>Add a built-in or custom adapter</li>
                <li>Configure API keys and venue</li>
                <li>Test the connection</li>
                <li>Use in TradingNode for live trading</li>
            </ol>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Pages render here -->
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <div id="loading-text" style="color: var(--text-secondary); font-size: 0.9rem;">Loading...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/adapter_config.js"></script>
    <script src="js/custom_adapters.js"></script>
    <script src="js/data_formats.js"></script>
</body>
</html>
