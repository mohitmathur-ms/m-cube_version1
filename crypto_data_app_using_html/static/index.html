<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M_Cube Crypto Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Plotly.js for charts -->
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="sidebar-title">M_Cube</h1>
            <p class="sidebar-caption">Crypto Data Dashboard</p>
        </div>
        <div class="sidebar-divider"></div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">&#9875;</span> Dashboard
            </a>
            <a href="#" class="nav-item" data-page="load_data">
                <span class="nav-icon">&#128194;</span> Load Data
            </a>
            <a href="#" class="nav-item" data-page="view_data">
                <span class="nav-icon">&#128202;</span> View Data
            </a>
            <a href="#" class="nav-item" data-page="backtest">
                <span class="nav-icon">&#129514;</span> Run Backtest
            </a>
            <a href="#" class="nav-item" data-page="tearsheet">
                <span class="nav-icon">&#128200;</span> Tearsheet
            </a>
        </nav>

        <div class="sidebar-divider"></div>

        <div class="sidebar-settings">
            <label for="catalog-path">Catalog Storage Path</label>
            <input type="text" id="catalog-path" value="./catalog" placeholder="Catalog path">
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-info">
            <p><strong>How it works:</strong></p>
            <ol>
                <li><strong>Load</strong> - Import crypto CSV data</li>
                <li><strong>View</strong> - Explore data & charts</li>
                <li><strong>Backtest</strong> - Run trading strategies</li>
                <li><strong>Tearsheet</strong> - Analyze performance</li>
            </ol>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Pages are rendered here dynamically -->
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p id="loading-text">Loading...</p>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- JS Modules -->
    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/load_data.js"></script>
    <script src="/js/view_data.js"></script>
    <script src="/js/backtest.js"></script>
    <script src="/js/tearsheet.js"></script>
</body>
</html>
